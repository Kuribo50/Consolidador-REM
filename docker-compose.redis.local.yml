# Local development helper only.
# Not used by the main production deployment.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Bind only to localhost to avoid public exposure.
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data_local:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data_local: