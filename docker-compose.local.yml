# Local development only.
# Production on Coolify should use Dockerfile directly (no compose).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: consolidador-rem:local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      CONSOLIDAR_QUEUE_MODE: direct
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s