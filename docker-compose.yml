services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: consolidador:latest
    container_name: consolidador-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      CONSOLIDAR_QUEUE_MODE: redis
      REDIS_URL: redis://redis:6379
      CONSOLIDAR_MAX_XLSX: 4
      CONSOLIDAR_MAX_CSV: 8
      CONSOLIDAR_MAX_TOTAL: 8
      CONSOLIDAR_JOB_WAIT_TIMEOUT_MS: 900000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: consolidador-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
