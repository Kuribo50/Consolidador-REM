# Production deployment for Coolify (Docker Compose build pack).
# This stack uses ONLY local Docker build from this repository.
# No Docker Hub / external registry required.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      CONSOLIDAR_QUEUE_MODE: direct
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      # Traefik buffering:
      # - maxRequestBodyBytes=0 => sin limite de tamano por middleware.
      # - memRequestBodyBytes subido para reducir spooling temprano a disco.
      - "traefik.http.middlewares.consolidador-upload.buffering.maxRequestBodyBytes=0"
      - "traefik.http.middlewares.consolidador-upload.buffering.memRequestBodyBytes=67108864"
      - "coolify.traefik.middlewares=consolidador-upload"
